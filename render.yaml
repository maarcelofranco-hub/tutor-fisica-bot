services:
  - type: web
    name: tutor-fisica-bot
    runtime: python
    plan: free
    rootDir: work/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: QUESTION_SOURCE
        value: auto
      - key: GEMINI_CORRECTION_STYLE
        value: detailed
      - key: DRIVE_THEMES_FOLDER_NAME
        value: Temas
      - key: GOOGLE_DRIVE_ROOT_FOLDER_ID
        value: 1doXGbprntcbLDc28XQ7T-kImx1tc7jcd
      - key: WHATSAPP_VERIFY_TOKEN
        value: physics-mvp-verify-2026-himari
      - key: WHATSAPP_API_VERSION
        value: v21.0
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: DATABASE_URL
        value: sqlite:///./data/app.db
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
